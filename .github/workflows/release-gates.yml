name: Release gates

on:
  push:
    branches: ["master", "main"]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Check production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build optimized assets
        run: npm run build

      - name: Run API, security, backup and static tests
        run: npm test

      - name: Run real-browser accessibility tests
        run: npm run test:browser

      - name: Verify production container
        run: docker build --tag samara-organics:release .
